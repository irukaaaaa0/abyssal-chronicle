<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>凸リセット</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
body{font-family:monospace;background:#060a10;color:#c0d8c0;padding:20px;font-size:13px;}
button{background:#10c0a0;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;margin:4px;}
.btn-red{background:#e03060;color:#fff;}
input{background:rgba(0,20,40,.6);border:.5px solid #334;border-radius:6px;padding:8px;font-size:12px;color:#c8dce8;width:300px;font-family:monospace;}
#log{white-space:pre-wrap;background:#0a1a0a;padding:14px;border-radius:8px;margin-top:12px;max-height:400px;overflow-y:auto;}
</style>
</head>
<body>
<h2 style="color:#10c0a0;margin-bottom:16px;">💥 凸データリセットツール</h2>
<div style="background:rgba(180,60,0,.2);border:.5px solid rgba(220,100,0,.4);border-radius:8px;padding:12px;margin-bottom:16px;font-size:12px;">
  ⚠️ 全キャラクターの凸数(breakthrough)・素材数(stockCopies)を0にリセットします。<br>
  レベル・上限解放はそのまま保持されます。
</div>
<label style="font-size:11px;color:#8aabb8;">対象プレイヤーのUID（空欄=全員）</label><br>
<input id="target-uid" placeholder="特定プレイヤーのUIDを入力（空欄で全員）" style="margin:8px 0;"><br>
<button onclick="previewReset()">🔍 プレビュー（実行前確認）</button>
<button class="btn-red" onclick="confirmReset()">⚠️ 凸リセット実行</button>
<div id="log">待機中...</div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBVgzrDFTUE9JuXxqUv9LHyO4dwFPXyKpE",
  authDomain:"abyssal-chronicle.firebaseapp.com",
  projectId:"abyssal-chronicle",
  storageBucket:"abyssal-chronicle.appspot.com",
  messagingSenderId:"601713323896",
  appId:"1:601713323896:web:92e756bfcae26a1745228d"
});
const db=firebase.firestore();
const el=document.getElementById('log');
function log(msg){el.textContent+=msg+'\n';}

async function getTargetDocs(){
  var uid=document.getElementById('target-uid').value.trim();
  if(uid){
    var doc=await db.collection('players').doc(uid).get();
    return doc.exists?[doc]:[];
  } else {
    var snap=await db.collection('players').get();
    return snap.docs;
  }
}

async function previewReset(){
  el.textContent='プレビュー中...\n';
  try{
    var docs=await getTargetDocs();
    log('対象プレイヤー数: '+docs.length+'人\n');
    docs.forEach(function(doc){
      var d=doc.data();
      var name=d.playerName||'不明';
      var od=d.ownedData||{};
      var hasBreak=Object.entries(od).filter(function(e){return (e[1].breakthrough||0)>0;});
      log('👤 '+name+' ('+doc.id.slice(0,8)+'...)');
      if(hasBreak.length===0){
        log('  → 凸済みキャラなし');
      } else {
        hasBreak.forEach(function(e){
          log('  ID:'+e[0]+' breakthrough:'+e[1].breakthrough+' stock:'+(e[1].stockCopies||0));
        });
      }
      log('');
    });
    log('✅ プレビュー完了。「凸リセット実行」で適用されます。');
  }catch(e){ log('❌ エラー: '+e.message); }
}

async function confirmReset(){
  if(!confirm('本当に凸データをリセットしますか？\nこの操作は取り消せません。')) return;
  el.textContent='リセット中...\n';
  try{
    var docs=await getTargetDocs();
    var count=0;
    for(var doc of docs){
      var d=doc.data();
      var od=d.ownedData||{};
      var updated=false;
      Object.keys(od).forEach(function(id){
        if((od[id].breakthrough||0)>0||(od[id].stockCopies||0)>0){
          od[id].breakthrough=0;
          od[id].stockCopies=0;
          updated=true;
        }
      });
      if(updated){
        await db.collection('players').doc(doc.id).update({ownedData:od});
        log('✅ リセット: '+(d.playerName||doc.id.slice(0,8)));
        count++;
      } else {
        log('⏭️ スキップ（凸なし）: '+(d.playerName||doc.id.slice(0,8)));
      }
    }
    log('\n🎉 完了！ '+count+'人の凸データをリセットしました。');
  }catch(e){ log('❌ エラー: '+e.message); }
}
</script>
</body>
</html>
