<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js">
// ================================================================
// UID指定でドキュメント作成・復元
// ================================================================
async function createPlayerDoc(){
  const uid      = document.getElementById('create-uid').value.trim();
  const pid      = document.getElementById('create-playerid').value.trim().toUpperCase()
                   || ('USER-' + Math.random().toString(36).slice(2,6).toUpperCase());
  const gem      = parseInt(document.getElementById('create-gem').value)||600;
  const gold     = parseInt(document.getElementById('create-gold').value)||0;
  const rank     = parseInt(document.getElementById('create-rank').value)||1;
  const name     = document.getElementById('create-name').value.trim()||'深海司令官';
  const ownedRaw = document.getElementById('create-owned').value.trim();
  const owned    = ownedRaw ? ownedRaw.split(',').map(n=>parseInt(n.trim())).filter(n=>!isNaN(n)) : [29,30,31];
  const resultEl = document.getElementById('create-result');

  if(!uid){ adminToast('UIDを入力してください'); return; }
  if(uid.length < 10){ adminToast('UIDが短すぎます（正しいUIDを入力してください）'); return; }

  resultEl.textContent = '作成中...';
  resultEl.style.color = '#8aabb8';

  try{
    const docRef = db.collection('players').doc(uid);

    // 既存データを確認
    const existing = await docRef.get();
    const isExisting = existing.exists;

    const docData = {
      playerId:        pid,
      playerName:      name,
      gem:             gem,
      gold:            gold,
      rank:            rank,
      rankExp:         0,
      owned:           owned,
      party:           [-1,-1,-1],
      cleared:         [],
      pityPerBanner:   [0,0,0,0,0,0,0,0,0],
      ownedData:       {},
      achievements:    {},
      equippedTitle:   '',
      friends:         [],
      pendingRequests: [],
      helperChar:      null,
      supportChar:     null,
      pvpRank:         1200,
      pvpWin:          0,
      pvpLose:         0,
      receivedGifts:   [],
      receivedRankRewards: [],
      dailyDone:       0,
      towerFloor:      1,
      towerBest:       0,
      lastSaved:       new Date().toISOString(),
      createdAt:       new Date().toISOString(),
    };

    // setで上書き作成（ドキュメントがなくても作成される）
    await docRef.set(docData);

    const msg = isExisting
      ? '✅ 既存ドキュメントを上書き復元しました！'
      : '✅ 新規ドキュメントを作成しました！';
    resultEl.textContent = msg + ' UID: ' + uid.slice(0,12) + '... | PlayerID: ' + pid;
    resultEl.style.color = '#60e080';
    adminToast(msg);

    // ユーザー一覧を更新
    loadUsers();
  }catch(e){
    resultEl.textContent = '❌ エラー: ' + e.message;
    resultEl.style.color = '#e06060';
    adminToast('❌ 作成失敗: ' + e.message);
    console.error('[CREATE DOC]', e);
  }
}
</script>

<script>
// Firebase設定
const firebaseConfig = {
  apiKey: "AIzaSyBVgzrDFTUE9JuXxqUv9LHyO4dwFPXyKpE",
  authDomain: "abyssal-chronicle.firebaseapp.com",
  projectId: "abyssal-chronicle",
  storageBucket: "abyssal-chronicle.appspot.com",
  messagingSenderId: "601713323896",
  appId: "1:601713323896:web:92e756bfcae26a1745228d"
};
firebase.initializeApp(firebaseConfig);
const db   = firebase.firestore();
const auth = firebase.auth();

const ADMIN_PW = 'iruka0531';
let allUsers = [];
let deleteTargetUid = null;

// ================================================================
// ログイン
// ================================================================
async function adminLogin(){
  const pw = document.getElementById('admin-pw').value;
  if(pw !== ADMIN_PW){
    document.getElementById('login-err').textContent = 'パスワードが違います';
    return;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-header').style.display='flex';
  document.getElementById('main').classList.add('show');
  await loadDashboard();
  await loadUsers();
  await loadNotices();
  await loadGifts();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    const tabs=['dashboard','users','notices','gifts'];
    t.classList.toggle('active', tabs[i]===tab);
  });
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

// ================================================================
// ダッシュボード
// ================================================================
async function loadDashboard(){
  try{
    const snap = await db.collection('players').get();
    const users = snap.docs.map(d=>({uid:d.id,...d.data()}));
    const total = users.length;
    const now = Date.now();
    const active = users.filter(u=>{
      const ls = u.lastSaved ? new Date(u.lastSaved).getTime() : 0;
      return (now-ls) < 7*24*60*60*1000;
    }).length;
    const ranks = users.map(u=>u.rank||1);
    const maxRank = Math.max(...ranks, 1);
    const avgRank = Math.round(ranks.reduce((a,b)=>a+b,0)/Math.max(ranks.length,1));

    document.getElementById('s-total').textContent = total;
    document.getElementById('s-active').textContent = active;
    document.getElementById('s-maxrank').textContent = 'Rank '+maxRank;
    document.getElementById('s-avgrank').textContent = 'Rank '+avgRank;
    document.getElementById('header-user-count').textContent = 'ユーザー数: '+total;

    // ランキングTop10
    const top10 = [...users].sort((a,b)=>(b.rank||1)-(a.rank||1)).slice(0,10);
    document.getElementById('dash-ranking').innerHTML = top10.map((u,i)=>{
      const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1);
      const pvpTier = getPvpTierLabel(u.pvpRank||1200);
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px;background:#060c18;border-radius:8px;margin-bottom:6px;">'
        +'<div style="font-size:14px;width:28px;text-align:center;">'+medal+'</div>'
        +'<div style="flex:1;">'
        +'<div style="font-size:13px;font-weight:600;color:#60a0d0;">'+(u.playerId||'???')+'</div>'
        +'<div style="font-size:10px;color:#3a5878;">キャラ'+(u.owned||[]).length+'体 | クリア'+(u.cleared||[]).length+'層 | PvP '+(u.pvpRank||1200)+'pts</div>'
        +'</div>'
        +'<div>'
        +'<div style="font-size:13px;font-weight:700;color:#ffd060;">Rank '+(u.rank||1)+'</div>'
        +'<div class="rank-tier '+pvpTier.cls+'">'+pvpTier.label+'</div>'
        +'</div></div>';
    }).join('');
  }catch(e){ console.error('dashboard error:',e); }
}

// ================================================================
// ユーザー管理
// ================================================================
async function loadUsers(){
  const el = document.getElementById('users-list-admin');
  el.innerHTML = '<div style="font-size:12px;color:#3a5878;padding:10px;">読み込み中...</div>';
  try{
    const snap = await db.collection('players').get();
    allUsers = snap.docs.map(d=>({uid:d.id,...d.data()}));
    filterUsers();
  }catch(e){
    el.innerHTML = '<div style="color:#e06060;font-size:12px;">❌ エラー: '+e.message+'</div>';
  }
}

function getRankTierLabel(rank){
  if(rank>=50) return {label:'深海提督',cls:'rt-5'};
  if(rank>=30) return {label:'旧破征服',cls:'rt-4'};
  if(rank>=20) return {label:'深淵覇者',cls:'rt-3'};
  if(rank>=10) return {label:'指揮官',cls:'rt-2'};
  return {label:'新人',cls:'rt-1'};
}
function getPvpTierLabel(pvpRank){
  if(pvpRank>=2000) return {label:'旧破神',cls:'rt-5'};
  if(pvpRank>=1800) return {label:'深淵王',cls:'rt-4'};
  if(pvpRank>=1600) return {label:'覇者',cls:'rt-3'};
  if(pvpRank>=1400) return {label:'上級戦士',cls:'rt-2'};
  if(pvpRank>=1200) return {label:'戦士',cls:'rt-1'};
  return {label:'見習い',cls:'rt-1'};
}

function filterUsers(){
  const search = (document.getElementById('user-search').value||'').toLowerCase();
  const sort   = document.getElementById('user-sort').value;
  let users = [...allUsers];
  if(search) users = users.filter(u=>(u.playerId||'').toLowerCase().includes(search));
  if(sort==='rank')    users.sort((a,b)=>(b.rank||1)-(a.rank||1));
  if(sort==='created') users.sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  if(sort==='pvp')     users.sort((a,b)=>(b.pvpRank||1200)-(a.pvpRank||1200));
  renderUserList(users);
}

function renderUserList(users){
  const el = document.getElementById('users-list-admin');
  if(!users.length){ el.innerHTML='<div style="font-size:12px;color:#3a5878;padding:10px;">ユーザーが見つかりません</div>'; return; }

  el.innerHTML = users.map(u=>{
    const rankTier = getRankTierLabel(u.rank||1);
    const pvpTier  = getPvpTierLabel(u.pvpRank||1200);
    const lastSaved = u.lastSaved ? new Date(u.lastSaved).toLocaleString('ja-JP') : '不明';
    const createdAt = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ja-JP') : '不明';
    const towerBest = u.towerBest||0;
    const pvpW = u.pvpWin||0, pvpL = u.pvpLose||0;
    const winRate = (pvpW+pvpL)>0 ? Math.round(pvpW/(pvpW+pvpL)*100)+'%' : '—';

    return '<div class="user-card" id="uc-'+u.uid+'">'
      // ヘッダー
      +'<div class="user-card-header">'
      +'<div>'
      +'<div class="user-pid">'+(u.playerId||'（ID未設定）')
        +' <span class="rank-tier '+rankTier.cls+'">'+rankTier.label+'</span>'
        +' <span class="rank-tier '+pvpTier.cls+'">'+pvpTier.label+'</span>'
      +'</div>'
      +'<div class="user-uid">UID: '+u.uid+'</div>'
      +'</div>'
      +'<div class="user-rank">Rank '+( u.rank||1)+'</div>'
      +'</div>'
      // ステータスグリッド
      +'<div class="user-card-body">'
      +'<div class="user-stat"><div class="user-stat-lbl">💰 ゴールド</div><div class="user-stat-val">'+(u.gold||0).toLocaleString()+'</div></div>'
      +'<div class="user-stat"><div class="user-stat-lbl">💎 ジェム</div><div class="user-stat-val">'+(u.gem||0).toLocaleString()+'</div></div>'
      +'<div class="user-stat"><div class="user-stat-lbl">🎭 キャラ所持</div><div class="user-stat-val">'+(u.owned||[]).length+'体</div></div>'
      +'<div class="user-stat"><div class="user-stat-lbl">⚓ クリア層数</div><div class="user-stat-val">'+(u.cleared||[]).length+'層</div></div>'
      +'<div class="user-stat"><div class="user-stat-lbl">🏆 無限塔最高</div><div class="user-stat-val">'+(towerBest>0?towerBest+'F':'未挑戦')+'</div></div>'
      +'<div class="user-stat"><div class="user-stat-lbl">⚔️ PvP戦績</div><div class="user-stat-val">'+pvpW+'勝'+pvpL+'敗 '+winRate+'</div></div>'
      +'</div>'
      // フッター
      +'<div class="user-card-footer">'
      +'<div style="font-size:9px;color:#2a4060;">登録: '+createdAt+' | 最終: '+lastSaved+'</div>'
      +'<div style="display:flex;gap:6px;">'
      +'<button class="btn-sm success" onclick="openGiftModal(\''+u.uid+'\',\''+( u.playerId||'')+'\')" >🎁 個別配布</button>'
      +'<button class="btn-sm danger" onclick="openDeleteModal(\''+u.uid+'\',\''+( u.playerId||'?')+'\')">🗑️ 削除</button>'
      +'</div>'
      +'</div>'
      +'</div>';
  }).join('');
}

// ================================================================
// アカウント削除
// ================================================================
function openDeleteModal(uid, playerId){
  deleteTargetUid = uid;
  document.getElementById('delete-modal-body').textContent =
    'プレイヤー「'+playerId+'」(UID: '+uid+') のデータを削除します。\nこの操作は取り消せません。本当に削除しますか？';
  document.getElementById('delete-modal').classList.add('show');
}
function closeDeleteModal(){
  document.getElementById('delete-modal').classList.remove('show');
  deleteTargetUid = null;
}
async function confirmDeleteUser(){
  if(!deleteTargetUid){ closeDeleteModal(); return; }
  const uid = deleteTargetUid;
  closeDeleteModal();
  try{
    await db.collection('players').doc(uid).delete();
    adminToast('✅ アカウントを削除しました（UID: '+uid.slice(0,8)+'...）');
    // UI から即削除
    const el = document.getElementById('uc-'+uid);
    if(el) el.remove();
    allUsers = allUsers.filter(u=>u.uid!==uid);
    // ダッシュボードも更新
    loadDashboard();
  }catch(e){
    adminToast('❌ 削除失敗: '+e.message);
    console.error(e);
  }
}

// ================================================================
// 個別ギフト配布
// ================================================================
let giftTargetUid = null;
function openGiftModal(uid, playerId){
  giftTargetUid = uid;
  const gem  = prompt('💎 ジェムを配布（'+playerId+'）\n数量を入力:','100');
  if(gem===null) return;
  const gold = prompt('💰 ゴールドを配布（'+playerId+'）\n数量を入力:','0');
  if(gold===null) return;
  const msg  = prompt('メッセージ:','管理者より') || '管理者より';
  sendIndividualGift(uid, parseInt(gem)||0, parseInt(gold)||0, msg, playerId);
}
async function sendIndividualGift(uid, gem, gold, msg, playerId){
  try{
    const giftId = 'gift_individual_'+Date.now();
    await db.collection('gifts').doc(giftId).set({
      gem, gold, message:msg,
      targetUid: uid,
      targetPlayerId: playerId,
      isIndividual: true,
      createdAt: new Date().toISOString(),
      active: true,
    });
    adminToast('✅ '+playerId+' に 💎'+gem+' 💰'+gold.toLocaleString()+' を配布しました');
  }catch(e){ adminToast('❌ 配布失敗: '+e.message); }
}

// ================================================================
// お知らせ
// ================================================================
async function postNotice(){
  const title = document.getElementById('notice-title').value.trim();
  const type  = document.getElementById('notice-type').value;
  const body  = document.getElementById('notice-body').value.trim();
  const imp   = document.getElementById('notice-important').checked;
  if(!title||!body){ adminToast('タイトルと内容を入力してください'); return; }
  try{
    await db.collection('notices').add({
      title,type,body,important:imp,
      date: new Date().toISOString().slice(0,10),
      createdAt: new Date().toISOString(),
    });
    adminToast('✅ お知らせを投稿しました');
    document.getElementById('notice-title').value='';
    document.getElementById('notice-body').value='';
    loadNotices();
  }catch(e){ adminToast('❌ 投稿失敗: '+e.message); }
}

async function loadNotices(){
  const el = document.getElementById('notices-list-admin');
  try{
    const snap = await db.collection('notices').orderBy('createdAt','desc').limit(20).get();
    if(snap.empty){ el.innerHTML='<div style="font-size:12px;color:#3a5878;">お知らせなし</div>'; return; }
    el.innerHTML = snap.docs.map(d=>{
      const n=d.data();
      return '<div class="notice-item">'
        +'<div><div style="font-size:12px;font-weight:500;">'+(n.important?'⭐ ':'')+n.title+'</div>'
        +'<div style="font-size:10px;color:#3a5878;margin-top:3px;">['+n.type+'] '+(n.date||'')+'</div></div>'
        +'<button class="btn-sm danger" onclick="deleteNotice(\''+d.id+'\')">削除</button>'
        +'</div>';
    }).join('');
  }catch(e){
    try{
      const snap2 = await db.collection('notices').limit(20).get();
      if(snap2.empty){ el.innerHTML='<div style="font-size:12px;color:#3a5878;">お知らせなし</div>'; return; }
      el.innerHTML = snap2.docs.map(d=>{
        const n=d.data();
        return '<div class="notice-item"><div><div style="font-size:12px;font-weight:500;">'+(n.important?'⭐ ':'')+n.title+'</div></div>'
          +'<button class="btn-sm danger" onclick="deleteNotice(\''+d.id+'\')">削除</button></div>';
      }).join('');
    }catch(e2){ el.innerHTML='<div style="color:#e06060;font-size:12px;">❌ エラー</div>'; }
  }
}

async function deleteNotice(id){
  if(!confirm('このお知らせを削除しますか？')) return;
  await db.collection('notices').doc(id).delete();
  adminToast('🗑️ 削除しました');
  loadNotices();
}

// ================================================================
// ギフト配布
// ================================================================
async function createGift(){
  const gem  = parseInt(document.getElementById('gift-gem').value)||0;
  const gold = parseInt(document.getElementById('gift-gold').value)||0;
  const msg  = document.getElementById('gift-msg').value.trim()||'管理者よりギフト';
  if(gem===0&&gold===0){ adminToast('ジェムまたはゴールドを入力してください'); return; }
  if(!confirm('全ユーザーに 💎'+gem+' 💰'+gold+' を配布しますか？')){ return; }
  try{
    await db.collection('gifts').add({
      gem,gold,message:msg,
      isIndividual:false,
      createdAt:new Date().toISOString(),
      active:true,
    });
    adminToast('✅ ギフトを配布しました（💎'+gem+' 💰'+gold+'）');
    document.getElementById('gift-gem').value='0';
    document.getElementById('gift-gold').value='0';
    document.getElementById('gift-msg').value='';
    loadGifts();
  }catch(e){ adminToast('❌ 配布失敗: '+e.message); }
}

async function loadGifts(){
  const el = document.getElementById('gifts-list-admin');
  try{
    const snap = await db.collection('gifts').orderBy('createdAt','desc').limit(20).get();
    if(snap.empty){ el.innerHTML='<div style="font-size:12px;color:#3a5878;">配布履歴なし</div>'; return; }
    el.innerHTML = snap.docs.map(d=>{
      const g=d.data();
      const target = g.isIndividual ? ('個別: '+g.targetPlayerId) : '全員';
      return '<div class="notice-item">'
        +'<div><div style="font-size:12px;font-weight:500;">'+g.message+'</div>'
        +'<div style="font-size:10px;color:#3a5878;margin-top:3px;">'+target+' | 💎'+g.gem+' 💰'+(g.gold||0).toLocaleString()+' | '+(g.createdAt||'').slice(0,10)+'</div></div>'
        +(g.active
          ?'<button class="btn-sm danger" onclick="stopGift(\''+d.id+'\')">停止</button>'
          :'<span style="font-size:10px;color:#3a5060;">停止済</span>')
        +'</div>';
    }).join('');
  }catch(e){
    const snap2 = await db.collection('gifts').limit(20).get().catch(()=>({empty:true,docs:[]}));
    if(snap2.empty){ el.innerHTML='<div style="font-size:12px;color:#3a5878;">配布履歴なし</div>'; return; }
    el.innerHTML = snap2.docs.map(d=>{const g=d.data();return '<div class="notice-item"><div>'+g.message+' (💎'+g.gem+')</div></div>';}).join('');
  }
}

async function stopGift(id){
  await db.collection('gifts').doc(id).update({active:false});
  adminToast('⏹️ ギフトを停止しました');
  loadGifts();
}

// ================================================================
// トースト
// ================================================================
function adminToast(msg){
  const el=document.getElementById('admin-toast');
  el.textContent=msg; el.style.opacity='1';
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.style.opacity='0', 2500);
}

document.getElementById('admin-pw').addEventListener('keydown',e=>{ if(e.key==='Enter') adminLogin(); });
</script>
