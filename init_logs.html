<style>

<body>

<button onclick="deleteAll()">🗑️ 全削除して再投稿</button>
<button onclick="checkLogs()">🔍 現在のログ確認</button>
<div id="log">待機中...</div>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyBVgzrDFTUE9JuXxqUv9LHyO4dwFPXyKpE",
  authDomain:"abyssal-chronicle.firebaseapp.com",
  projectId:"abyssal-chronicle",
  storageBucket:"abyssal-chronicle.appspot.com",
  messagingSenderId:"601713323896",
  appId:"1:601713323896:web:92e756bfcae26a1745228d"
});
const db = firebase.firestore();
const el = document.getElementById('log');

const LOGS = [
  {
    version:"0.3.0", date:"2026-03-01",

      "PvP闘技場が遊べるようになりました",
      "無限塔が遊べるようになりました",
      "フレンド・助っ人機能が使えるようになりました",
      "実績・称号システムを追加しました",
      "オンラインセーブに対応しました"
    ]
  },
  {
    version:"0.4.0", date:"2026-03-10",
    items:[
      "キャラクターに属性が追加されました（🔥炎 ❄️氷 ⚡雷 🌊水 🌑闇 ✨光 ⚪無）",
      "戦闘に状態異常が追加されました（炎症・毒・凍結・麻痺）",
      "タンク・サポート・デバッファーの戦闘効果が強化されました",
      "フレンド機能がUIDで検索できるようになりました",
      "ランクマイルストーン報酬が追加されました",
      "PvPに属性・状態異常システムが適用されました",
      "クエスト4〜9章が追加されました"
    ]
  },
  {
    version:"0.4.1", date:"2026-03-15",
    items:[
      "PvP戦闘に詳細パネルが追加されました（デバフ効果・コンボ説明）",
      "助っ人スロットがリアルタイムで更新されるようになりました",
      "フレンド削除時に双方のリストから削除されるよう修正しました"
    ]
  },
  {
    version:"0.5.0", date:"2026-03-18",
    items:[
      "限定召喚が追加されました（専用天井80回・UR排出率1.5%）",
      "限定URキャラ3体が追加されました（深淵神イブリス・星海の巫女アルテア・業炎の覇王カルドス）",
      "召喚画面が「限定召喚」「恒常召喚」に分かれました",

    ]

  {
    version:"0.5.1", date:"2026-03-19",
    items:[

    ]

  {
    version:"0.5.2", date:"2026-03-20",
    items:[
      "ゲーム起動時に最新のアップデート情報が表示されるようになりました",

    ]

  {

    ]
  }
];

async function checkLogs(){
  el.textContent = '確認中...\n';
  const snap = await db.collection('updateLog').get();
  el.textContent = '合計: ' + snap.docs.length + ' ドキュメント\n\n';
  snap.docs.forEach(d=>{
    const data = d.data();
    el.textContent += '✅ ID: ' + d.id + '  v' + data.version + '  (' + data.date + ')  ' + (data.items||[]).length + '項目\n';
  });
}

async function deleteAll(){
  el.textContent = '全削除中...\n';
  try{
    const snap = await db.collection('updateLog').get();
    for(const doc of snap.docs){
      await db.collection('updateLog').doc(doc.id).delete();
      el.textContent += '🗑️ 削除: ' + doc.id + '\n';
    }
    el.textContent += '\n再投稿中...\n';
    for(const log of LOGS){
      const docId = 'v' + log.version.replace(/\./g,'_');
      await db.collection('updateLog').doc(docId).set({...log, postedAt: new Date().toISOString()});
      el.textContent += '✅ v' + log.version + ' 投稿完了\n';
    }
    el.textContent += '\n🎉 完了！ゲームを開いて確認してください。';
  }catch(e){
    el.textContent += '\n❌ エラー: ' + e.message;
  }
}
</script>
</body>
</html>
