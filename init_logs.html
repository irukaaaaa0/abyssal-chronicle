function addLog(msg){ document.getElementById('log').textContent += msg + '\n'; }

async function postAll(){
  addLog('投稿開始...\n');
  for(const log of LOGS){
    try{
      const docId = 'v' + log.version.replace(/\./g,'_');
      await db.collection('updateLog').doc(docId).set({
        version: log.version,
        date: log.date,
        items: log.items,
        postedAt: new Date().toISOString()
      });
      addLog('✅ v' + log.version + ' を投稿しました');
    }catch(e){
      addLog('❌ v' + log.version + ' エラー: ' + e.message);
    }
  }
  addLog('\n🎉 全バージョンの投稿完了！');
}
