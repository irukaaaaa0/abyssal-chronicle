async function deleteAndRepost(){
  el.textContent = '開始...\n';
  // updateLog全削除
  log('📋 updateLogを削除中...');
  const logSnap = await db.collection('updateLog').get();
  for(const doc of logSnap.docs){
    await db.collection('updateLog').doc(doc.id).delete();
    log('  🗑️ ' + doc.id);
  }
  // updateLog再投稿
  log('\n📋 updateLogを投稿中...');
  for(const l of LOGS){
    const docId = 'v' + l.version.replace(/\./g,'_');
    await db.collection('updateLog').doc(docId).set({...l, postedAt: new Date().toISOString()});
    log('  ✅ v' + l.version);
  }
  // お知らせ投稿
  await postNoticesOnly();
}

async function postNoticesOnly(){
  log('\n📢 お知らせを投稿中...');
  for(const n of NOTICES){
    await db.collection('notices').doc(n.id).set({...n, createdAt: new Date().toISOString()});
    log('  ✅ ' + n.title);
  }
  log('\n🎉 完了！');
}

async function checkAll(){
  el.textContent = '確認中...\n';
  const logSnap = await db.collection('updateLog').get();
  log('📋 updateLog: ' + logSnap.docs.length + '件');
  logSnap.docs.forEach(d=> log('  v'+(d.data().version||'?')+' ('+d.id+')'));
  const notSnap = await db.collection('notices').get();
  log('\n📢 notices: ' + notSnap.docs.length + '件');
  notSnap.docs.forEach(d=> log('  '+(d.data().title||d.id)));
}
